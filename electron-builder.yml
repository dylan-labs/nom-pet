appId: com.nom.pet
productName: nom
directories:
  output: release
  buildResources: build-resources
afterPack: ./scripts/sign-adhoc.cjs
files:
  - out/**/*
  - package.json
asarUnpack:
  - resources/**

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: "-"

dmg:
  # Stable filename (no version) so releases/latest/download/<file> URLs in
  # the README keep working across version bumps. The actual version is
  # still visible inside the dmg metadata + app About dialog + GitHub
  # release page.
  artifactName: ${productName}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
